plugins {
    id "com.android.application"
    id "kotlin-android"
    id "kotlin-kapt"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {


    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }


    namespace "com.abtechnologies.fitHer"
    compileSdkVersion 35
    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures {
        dataBinding true
        viewBinding true
    }
//    composeOptions {
//        kotlinCompilerExtensionVersion = "1.5.4"
//    }
    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.abtechnologies.fitHer"
        minSdkVersion 26
        //noinspection OldTargetApi
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    signingConfigs {
//        release {
//            keyAlias 'key0'
//            keyPassword '11223344'
//            storeFile file('\\Users\\testuser\\StudioProjects\\fit_her\\android\\fitherkeystore.jks')
//            storePassword '11223344'
//        }
    }


    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
        debug {
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Fix Lottie and ExoPlayer to versions Zoom SDK expects
   implementation 'androidx.multidex:multidex:2.0.1'

   implementation 'com.airbnb.android:lottie:6.6.7'
   implementation 'com.google.android.exoplayer:exoplayer-core:2.19.1'
   implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'

   // Splash screen for Android 12+
   implementation 'androidx.core:core-splashscreen:1.0.1'
   implementation 'androidx.appcompat:appcompat:1.7.1'
   implementation 'com.google.android.material:material:1.13.0'
   implementation 'androidx.constraintlayout:constraintlayout:2.2.1'

    // Firebase + reCAPTCHA
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.android.recaptcha:recaptcha:18.6.1'

    // Desugaring support
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    
   implementation 'com.google.crypto.tink:tink-android:1.18.0'
   implementation 'androidx.work:work-runtime-ktx:2.10.4'

   implementation "androidx.compose.ui:ui:1.9.1"
   implementation "androidx.compose.material:material:1.9.1"
   implementation "androidx.compose.ui:ui-tooling-preview:1.9.1"
   debugImplementation "androidx.compose.ui:ui-tooling:1.9.1"

   implementation 'com.github.bumptech.glide:glide:5.0.5'
   kapt 'com.github.bumptech.glide:compiler:5.0.5'
   implementation "io.coil-kt:coil-compose:2.7.0"

   implementation "androidx.compose.material3:material3:1.3.2"

    implementation("io.reactivex.rxjava3:rxjava:3.1.8")
    implementation("io.reactivex.rxjava3:rxandroid:3.0.2")
   // Include Zoom SDK AAR(s) from libs folder
   implementation fileTree(dir: 'libs', include: ['*.aar'])
    implementation 'com.facebook.android:facebook-android-sdk:latest.release'

}
